<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Dream I Didn't Want to Wake From</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to bottom, #000000, #1a0000);
    font-family: 'Georgia', serif;
    color: #f5e6e6;
    overflow: hidden;
}

.scene {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 70%);
}

.shadow {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 200px;
    height: 400px;
    background: black;
    opacity: 0.6;
    filter: blur(20px);
    transform: translateX(-50%);
}

.text-box {
    position: absolute;
    width: 70%;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

.line {
    opacity: 0;
    margin: 20px 0;
    font-size: 20px;
    animation: fadeIn 2s forwards;
}

.line:nth-child(1) { animation-delay: 1s; }
.line:nth-child(2) { animation-delay: 4s; }
.line:nth-child(3) { animation-delay: 7s; }
.line:nth-child(4) { animation-delay: 10s; }
.line:nth-child(5) { animation-delay: 13s; }

@keyframes fadeIn {
    to { opacity: 1; }
}

.whisper {
    font-style: italic;
    color: #ff8080;
    font-size: 22px;
    letter-spacing: 1px;
}

</style>
</head>

<body>

<div class="scene"></div>
<div class="shadow"></div>

<div class="text-box">
    <div class="line">Last night… I had a dream.</div>

    <div class="line">Not the loud kind. Not the kind that fades fast.</div>

    <div class="line">It was quiet… almost real.</div>

    <div class="line">You were in a kitchen… making tea for yourself.</div>

    <div class="line">And I was there… pretending I needed coffee.</div>
</div>

<script>
const lines = [
    "But the truth is…",
    "I wasn’t there for the coffee.",
    "I moved closer… slowly…",
    "Until my arms found their way around your waist.",
    "And for a second… everything felt still.",
    "Like the world paused just to watch you exist.",
    "<span class='whisper'>\"Who needs coffee… when you’re already here.\"</span>"
];

let index = 0;

function showNextLine() {
    if (index >= lines.length) return;

    const div = document.createElement("div");
    div.classList.add("line");
    div.innerHTML = lines[index];
    document.querySelector(".text-box").appendChild(div);

    index++;
    setTimeout(showNextLine, 3000);
}

setTimeout(showNextLine, 15000);
</script>

</body>
</html>
