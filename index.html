<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Dream Scene</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #1a0000 20%, #000 80%);
    overflow: hidden;
    font-family: 'Georgia', serif;
    color: #ffe6cc;
}

/* Lighting overlay */
.light {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 60% 40%, rgba(255,180,0,0.25), transparent 60%),
                radial-gradient(circle at 40% 60%, rgba(255,0,0,0.2), transparent 70%);
}

/* Scene container */
.scene {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 70%;
}

/* SVG silhouettes */
svg {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 100%;
}

/* Male movement */
.male {
    animation: moveCloser 6s forwards ease-in-out;
}

@keyframes moveCloser {
    0% { transform: translateX(200px); }
    100% { transform: translateX(40px); }
}

/* Arm wrap illusion */
.arm {
    opacity: 0;
    animation: armWrap 2s forwards;
    animation-delay: 6s;
}

@keyframes armWrap {
    to { opacity: 1; }
}

/* Kiss moment glow */
.kiss-glow {
    position: absolute;
    top: 40%;
    left: 55%;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,0,0,0.3), transparent 70%);
    border-radius: 50%;
    opacity: 0;
    animation: kiss 3s forwards;
    animation-delay: 9s;
}

@keyframes kiss {
    to {
        opacity: 1;
        transform: scale(1.2);
    }
}

/* Text */
.text-box {
    position: absolute;
    top: 10%;
    left: 8%;
    width: 40%;
}

.line {
    opacity: 0;
    margin: 15px 0;
    font-size: 20px;
    animation: fadeIn 2s forwards;
}

.line:nth-child(1){animation-delay:1s;}
.line:nth-child(2){animation-delay:3s;}
.line:nth-child(3){animation-delay:5s;}
.line:nth-child(4){animation-delay:7s;}

.whisper {
    color: #ff4d4d;
    font-style: italic;
    font-size: 22px;
    opacity: 0;
    animation: fadeIn 2s forwards;
    animation-delay: 9s;
}

@keyframes fadeIn {
    to { opacity: 1; }
}
</style>
</head>

<body>

<div class="light"></div>

<div class="text-box">
    <div class="line">Last night… I had a dream.</div>
    <div class="line">You were in the kitchen… making tea.</div>
    <div class="line">And I was there… pretending I needed coffee.</div>
    <div class="line">But the truth is… I only needed you closer.</div>
    <div class="whisper">"Who needs coffee… when you're already here."</div>
</div>

<div class="scene">

<svg viewBox="0 0 800 400">

    <!-- Female silhouette -->
    <ellipse cx="350" cy="300" rx="40" ry="100" fill="black"/>
    <circle cx="350" cy="180" r="35" fill="black"/>

    <!-- Male silhouette -->
    <g class="male">
        <ellipse cx="450" cy="300" rx="40" ry="100" fill="black"/>
        <circle cx="450" cy="180" r="35" fill="black"/>

        <!-- Arm -->
        <rect class="arm" x="380" y="260" width="80" height="20" fill="black" rx="10"/>
    </g>

</svg>

<div class="kiss-glow"></div>

</div>

</body>
</html>
